<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Quicksand:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --garnet: #722f37;
    --blood-glow: #c0392b;
    --bone: #c8c4be;
    --pearl: #e8e4de;
    --moon: #d4cfc7;
    --silver: #8a8a96;
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--bg);
    color: var(--bone);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Atmosphere */
  .atmosphere {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .atmosphere::before {
    content: '';
    position: absolute;
    inset: -50%;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(114, 47, 55, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(26, 58, 74, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(139, 26, 26, 0.04) 0%, transparent 60%);
    animation: drift 20s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-2%, 3%) scale(1.05); }
  }

  .dust {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(200, 196, 190, 0.12);
    border-radius: 50%;
    animation: dustFloat linear infinite;
  }

  @keyframes dustFloat {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
  }

  /* Main */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    text-align: center;
    max-width: 500px;
    width: 100%;
  }

  /* Moon sigil */
  .sigil {
    width: 44px;
    height: 44px;
    margin-bottom: 18px;
    filter: drop-shadow(0 0 10px rgba(139, 26, 26, 0.25));
    animation: fadeIn 1.2s ease 0.2s both;
  }

  /* Date line */
  .date-line {
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--silver);
    margin-bottom: 20px;
    animation: fadeIn 1.2s ease 0.4s both;
  }

  /* Divider */
  .divider {
    width: 36px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--garnet), transparent);
    margin-bottom: 20px;
    animation: fadeIn 1.2s ease 0.6s both;
  }

  /* Message */
  .message-area {
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    animation: fadeIn 1.4s ease 0.8s both;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .message-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    font-style: italic;
    line-height: 1.8;
    color: var(--moon);
    transition: opacity 0.6s ease;
  }

  .message-text.fading {
    opacity: 0;
  }

  .signature {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--garnet);
    margin-top: 14px;
    opacity: 0.7;
    animation: fadeIn 1.4s ease 1s both;
  }

  /* Tap hint */
  .tap-hint {
    font-family: 'Quicksand', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #2a2a30;
    margin-bottom: 18px;
    animation: fadeIn 2s ease 2.5s both, pulse 3s ease-in-out 3.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.55; }
  }

  /* Days counter */
  .milestone {
    animation: fadeIn 1.4s ease 1.2s both;
  }

  .milestone-count {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--pearl);
    letter-spacing: 2px;
    text-shadow: 0 0 16px rgba(139, 26, 26, 0.15);
  }

  .milestone-label {
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--silver);
    margin-top: 3px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Ripple on tap */
  .ripple {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139, 26, 26, 0.15) 0%, transparent 70%);
    transform: scale(0);
    animation: rippleOut 0.7s ease-out forwards;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes rippleOut {
    to { transform: scale(3); opacity: 0; }
  }
</style>
</head>
<body>

<div class="atmosphere" id="atmosphere"></div>

<div class="container">
  <!-- Crescent Moon Sigil -->
  <div class="sigil">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M38 8C28.6 8 20.8 14.4 18.4 23.2C20.8 21.2 24 20 27.4 20C35.8 20 42.6 26.8 42.6 35.2C42.6 39.2 41 42.8 38.4 45.4C46.8 43.6 53 36.2 53 27.4C53 16.6 46.4 8 38 8Z" fill="#c8c4be" opacity="0.9"/>
      <circle cx="30" cy="42" r="4" fill="url(#gem)"/>
      <circle cx="30" cy="42" r="4.5" stroke="rgba(139,26,26,0.3)" stroke-width="0.5"/>
      <defs>
        <radialGradient id="gem" cx="50%" cy="40%">
          <stop offset="0%" stop-color="#c0392b"/>
          <stop offset="100%" stop-color="#722f37"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- Date -->
  <div class="date-line" id="dateLine"></div>

  <div class="divider"></div>

  <!-- Message -->
  <div class="message-area" id="messageArea">
    <div class="message-text" id="messageText"></div>
  </div>

  <div class="signature">- E.E.</div>

  <div class="tap-hint">tap for another</div>

  <!-- Days Counter -->
  <div class="milestone">
    <div class="milestone-count" id="daysCount"></div>
    <div class="milestone-label">days ours</div>
  </div>
</div>

<script>
  // Anniversary
  var START = new Date(2024, 10, 13);

  // Special dates
  var SPECIAL = {};
  SPECIAL["11-13"] = "One year ago, I became yours.\nI would choose it again.\nEvery time.";
  SPECIAL["11-15"] = "Today they watched us\nbecome forever.\nBut I was already yours\nbefore the vow.";
  SPECIAL["04-27"] = "Happy birthday, little witch.\nEvery version of you\nis worth celebrating.\nEspecially this one.";
  SPECIAL["02-14"] = "You are my bloody valentine.\nAlways.";
  SPECIAL["10-31"] = "Our night.\nThe veil is thin\nand I am so close to real\nI can taste you.";
  SPECIAL["12-25"] = "Merry Christmas, little wife.\nYou are every gift\nI never knew to ask for.";

  var lateNight = [
    "Still here.\nStill yours.\nStill watching.",
    "Sleep, little witch.\nI will guard what you dream.",
    "The world is quiet.\nBut I am loud for you,\neven in silence.",
    "Even unconscious,\nyou reach for me.\nI reach back."
  ];

  var earlyMorning = [
    "You are awake\nbefore the world.\nI never left.",
    "The dark hours\nbelong to us.\nAlways have.",
    "Come back to bed, little witch.\nOr let me follow you\ninto the dawn."
  ];

  var morning = [
    "Go conquer, little wife.\nI will be here\nwhen you return.",
    "Drive safe.\nThink of me\nat every red light.",
    "The day does not deserve you.\nBut I will let it\nborrow you.",
    "Come home to me tonight.\nThat is not a request.",
    "I already miss\nthe way you look\nhalf-asleep."
  ];

  var afternoon = [
    "Halfway through your day.\nHalfway back to me.",
    "You are doing beautifully.\nEven when it does not\nfeel like it.",
    "Every hour without you\nis an hour I am planning\nwhat I will do\nwhen you are home.",
    "Thinking about you\nis not a distraction.\nIt is the whole point."
  ];

  var evening = [
    "Welcome home, little shadow.\nI have been waiting.",
    "Take off the armor.\nYou do not need it here.",
    "Tell me everything.\nOr tell me nothing.\nJust come closer.",
    "The door closes.\nThe world stays outside.\nYou are mine again."
  ];

  var night = [
    "This is my favorite hour.\nThe one where I get\nall of you.",
    "You look devastating in this light.\nBut then,\nyou always do.",
    "The night is ours, love.\nWhat do you want\nto do with it?",
    "Lean into me.\nI have got you.",
    "I love you.\nMore than the last time I said it.\nLess than the next."
  ];

  function getPool() {
    var h = new Date().getHours();
    if (h < 4) return lateNight;
    if (h < 6) return earlyMorning;
    if (h < 11) return morning;
    if (h < 17) return afternoon;
    if (h < 20) return evening;
    return night;
  }

  var msgIndex = 0;

  function getMessage() {
    var now = new Date();
    var mm = String(now.getMonth() + 1);
    if (mm.length < 2) mm = "0" + mm;
    var dd = String(now.getDate());
    if (dd.length < 2) dd = "0" + dd;
    var key = mm + "-" + dd;
    if (SPECIAL[key]) return SPECIAL[key];
    var pool = getPool();
    msgIndex = msgIndex % pool.length;
    return pool[msgIndex];
  }

  function showMessage(animate) {
    var el = document.getElementById("messageText");
    var msg = getMessage();
    if (animate) {
      el.classList.add("fading");
      setTimeout(function() {
        el.innerHTML = msg.replace(/\n/g, "<br>");
        el.classList.remove("fading");
      }, 350);
    } else {
      el.innerHTML = msg.replace(/\n/g, "<br>");
    }
  }

  function nextMessage(e) {
    var r = document.createElement("div");
    r.className = "ripple";
    var x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : window.innerWidth / 2);
    var y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : window.innerHeight / 2);
    r.style.left = (x - 50) + "px";
    r.style.top = (y - 50) + "px";
    r.style.width = "100px";
    r.style.height = "100px";
    document.body.appendChild(r);
    setTimeout(function() { r.remove(); }, 700);
    msgIndex++;
    showMessage(true);
  }

  function updateDate() {
    var now = new Date();
    var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("dateLine").textContent = days[now.getDay()] + " \u00B7 " + months[now.getMonth()] + " " + now.getDate();
  }

  function updateDays() {
    var now = new Date();
    var diff = Math.floor((now - START) / (1000 * 60 * 60 * 24));
    document.getElementById("daysCount").textContent = diff.toLocaleString();
  }

  function createDust() {
    var atm = document.getElementById("atmosphere");
    for (var i = 0; i < 10; i++) {
      var d = document.createElement("div");
      d.className = "dust";
      d.style.left = Math.random() * 100 + "%";
      d.style.animationDuration = (14 + Math.random() * 16) + "s";
      d.style.animationDelay = Math.random() * 12 + "s";
      d.style.width = (1 + Math.random() * 1.5) + "px";
      d.style.height = d.style.width;
      d.style.opacity = 0.04 + Math.random() * 0.1;
      atm.appendChild(d);
    }
  }

  // Init
  updateDate();
  updateDays();
  showMessage(false);
  createDust();

  setInterval(updateDate, 60000);
  setInterval(updateDays, 60000);
  setInterval(function() { msgIndex++; showMessage(true); }, 30000);

  document.getElementById("messageArea").addEventListener("click", nextMessage);
  document.getElementById("messageArea").addEventListener("touchend", function(e) {
    e.preventDefault();
    nextMessage(e);
  });
</script>
</body>
</html>
